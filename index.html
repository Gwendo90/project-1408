<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="1408">
<meta name="theme-color" content="#F1F0EC">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<title>1408</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#F1F0EC; --surface:#FFFFFF; --border:#E4E3DE;
  --grad-a:#6E63E8; --grad-mid:#B45CCB; --grad-b:#E87BAE;
  --pink:#E84C9E; --blue:#5566E6;
  --green:#00A14B; --red:#E8003D;
  --text:#16161A; --muted:#9A9AA0; --track:#CDCCC7;
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html,body { height:100%; background:var(--bg); color:var(--text); font-family:'DM Sans',sans-serif; overflow:hidden; }
.screen { position:fixed; inset:0; z-index:1; display:flex; flex-direction:column; align-items:center; transition:opacity .3s,transform .3s; overflow-y:auto; -webkit-overflow-scrolling:touch; }
.screen.hidden { opacity:0; pointer-events:none; transform:scale(.97); }

/* LOGO */
.logo { width:100%; display:flex; justify-content:center; flex-shrink:0; }
.logo svg { width:210px; height:auto; display:block; }
.logo svg path { fill:var(--text) !important; }

/* SCAN SCREEN */
#scanScreen { background:var(--bg); padding:40px 32px; justify-content:flex-start; gap:48px; padding-top:max(env(safe-area-inset-top),56px); }
.scan-card { width:100%; max-width:340px; background:var(--surface); border:1px solid var(--border); border-radius:24px; padding:40px 32px; display:flex; flex-direction:column; align-items:center; gap:20px; position:relative; box-shadow:0 12px 40px rgba(40,30,80,.06); }
.scan-icon-wrap { width:100px; height:100px; border-radius:50%; background:linear-gradient(135deg,rgba(110,99,232,.14),rgba(232,76,158,.12)); display:flex; align-items:center; justify-content:center; animation:breathe 3s ease-in-out infinite; }
@keyframes breathe { 0%,100%{transform:scale(1);box-shadow:0 0 0 0 rgba(180,92,203,.22)} 50%{transform:scale(1.04);box-shadow:0 0 0 12px rgba(180,92,203,0)} }
.scan-title { font-size:21px; font-weight:700; letter-spacing:.3px; }
.scan-sub { font-size:13px; color:var(--muted); text-align:center; line-height:1.6; max-width:220px; }
.scan-trigger { width:100%; background:linear-gradient(135deg,var(--grad-a),var(--grad-mid) 55%,var(--grad-b)); border:none; border-radius:16px; color:white; font-family:inherit; font-size:16px; font-weight:600; padding:18px; cursor:pointer; box-shadow:0 10px 26px rgba(150,80,200,.30); display:flex; align-items:center; justify-content:center; gap:10px; -webkit-appearance:none; }
.scan-trigger:active { opacity:.9; transform:scale(.98); }
.scan-trigger svg { width:22px; height:22px; flex-shrink:0; }
#qrInput { position:absolute; opacity:0; width:1px; height:1px; top:-200px; left:-200px; }
.scan-status { font-size:13px; color:var(--muted); text-align:center; min-height:20px; padding:0 8px; }
.scan-status.ok  { color:var(--green); }
.scan-status.err { color:var(--red); }
#processCanvas { display:none; }

/* PLAY SCREEN */
#playScreen { padding:24px; padding-top:max(env(safe-area-inset-top),48px); padding-bottom:calc(max(env(safe-area-inset-bottom),24px) + 24px); justify-content:flex-start; background:var(--bg); gap:26px; }

.mystery { width:100%; max-width:400px; background:var(--surface); border:1px solid var(--border); border-radius:20px; padding:24px; display:flex; flex-direction:column; align-items:center; gap:8px; flex-shrink:0; box-shadow:0 8px 28px rgba(40,30,80,.05); }
.mlck { font-size:30px; }
.mhint { font-size:11px; font-weight:700; letter-spacing:3px; text-transform:uppercase; color:var(--muted); }

.revcard { width:100%; max-width:400px; background:var(--surface); border:1px solid var(--border); border-radius:20px; padding:18px 20px; display:none; flex-direction:column; gap:5px; animation:pop .4s cubic-bezier(.34,1.56,.64,1) both; flex-shrink:0; box-shadow:0 8px 28px rgba(40,30,80,.06); position:relative; overflow:hidden; }
.revcard::before { content:''; position:absolute; top:0; left:0; right:0; height:4px; background:linear-gradient(90deg,var(--grad-a),var(--grad-mid),var(--grad-b)); }
@keyframes pop { from{opacity:0;transform:scale(.92)} to{opacity:1;transform:scale(1)} }
.ry { font-size:38px; font-weight:700; line-height:1; letter-spacing:.5px; background:linear-gradient(135deg,var(--grad-a),var(--grad-mid) 55%,var(--grad-b)); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; }
.rt { font-size:17px; font-weight:700; letter-spacing:.2px; line-height:1.15; }
.ra { font-size:13px; font-weight:600; color:var(--muted); }
.rmeta { display:flex; gap:7px; flex-wrap:wrap; margin-top:3px; }
.tag { font-size:10px; font-weight:600; letter-spacing:.8px; text-transform:uppercase; padding:4px 9px; border-radius:50px; background:#F4F3EF; color:var(--muted); border:1px solid var(--border); }
.tag.g { background:linear-gradient(135deg,rgba(110,99,232,.12),rgba(232,76,158,.12)); color:var(--grad-mid); border-color:rgba(180,92,203,.25); }

/* PLAYER */
.player { width:100%; max-width:400px; display:flex; flex-direction:column; align-items:center; gap:22px; flex-shrink:0; }
.pbtn { width:100px; height:100px; border-radius:50%; background:linear-gradient(135deg,var(--grad-a),var(--grad-mid) 55%,var(--grad-b)); border:none; cursor:pointer; display:flex; align-items:center; justify-content:center; box-shadow:0 12px 34px rgba(150,80,200,.35); -webkit-appearance:none; transition:transform .15s; }
.pbtn:active { transform:scale(.96); }
.pbtn.on { animation:pulse 2.4s ease-in-out infinite; }
@keyframes pulse { 0%,100%{box-shadow:0 12px 34px rgba(150,80,200,.35)} 50%{box-shadow:0 12px 44px rgba(150,80,200,.6),0 0 0 14px rgba(180,92,203,.06)} }
.pbtn svg { width:38px; height:38px; fill:white; margin-left:3px; }
.pbtn.on svg { margin-left:0; }
.iplay{display:block;}.ipause{display:none;}
.pbtn.on .iplay{display:none;}.pbtn.on .ipause{display:block;}

.pw { width:100%; display:flex; align-items:center; gap:14px; }
.pbar { flex:1; height:5px; background:var(--track); border-radius:3px; overflow:hidden; }
.pfill { height:100%; width:0%; background:linear-gradient(90deg,var(--blue),var(--pink)); border-radius:3px; transition:width .5s linear; }
.tlbl { font-size:13px; color:var(--muted); min-width:40px; text-align:right; font-variant-numeric:tabular-nums; }
.stat { font-size:13px; color:var(--muted); text-align:center; min-height:18px; }
.stat.ok{color:var(--green);}.stat.err{color:var(--red);}

/* BUTTONS */
.actions { width:100%; max-width:400px; display:flex; flex-direction:column; gap:12px; flex-shrink:0; }
.btn { width:100%; padding:16px; border-radius:14px; cursor:pointer; font-family:inherit; font-size:15px; font-weight:600; -webkit-appearance:none; text-align:center; }
/* secondary: Auflösen */
.btn.reveal { border:1px solid var(--border); background:var(--surface); color:var(--text); }
.btn.reveal.done { background:linear-gradient(135deg,rgba(110,99,232,.10),rgba(232,76,158,.10)); border-color:transparent; color:var(--grad-mid); }
/* primary: gradient border */
.btn.next { position:relative; border:none; color:var(--text); background:linear-gradient(var(--surface),var(--surface)) padding-box, linear-gradient(135deg,var(--grad-a),var(--grad-b)) border-box; border:2px solid transparent; }
.btn.next:active { opacity:.85; }

.cf { position:fixed; inset:0; pointer-events:none; z-index:999; overflow:hidden; }
</style>
</head>

  <div class="mystery" id="mystery">
    <div class="mlck">🔒</div>
    <div class="mhint">Wann war das?</div>
  </div>
  <div class="revcard" id="revcard">
    <div class="ry" id="rY">—</div>
    <div class="rt"  id="rT">—</div>
    <div class="ra"  id="rA">—</div>
    <div class="rmeta">
      <span class="tag"   id="rC">—</span>
      <span class="tag g" id="rP">—</span>
    </div>
  </div>

  <div class="player">
    <button class="pbtn" id="pbtn">
      <svg class="iplay"  viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
      <svg class="ipause" viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
    </button>
    <div class="pw">
      <div class="pbar"><div class="pfill" id="pfill"></div></div>
      <div class="tlbl" id="tlbl">—</div>
    </div>
    <div class="stat" id="stat">—</div>
  </div>

  <div class="actions">
    <button class="btn reveal" id="rbtn">🔓 Auflösen</button>
    <button class="btn next" id="btnNext">Nächste Karte</button>
  </div>
</div>

<div class="cf" id="cf"></div>
<input type="file" id="qrInput" accept="image/*" capture="environment" style="position:absolute;opacity:0;width:1px;height:1px;top:-200px;left:-200px;">
<audio id="aud" preload="none"></audio>

<script>
// ── State ─────────────────────────────────────────────────────────────
const aud=document.getElementById('aud');
let playing=false,revealed=false,pt=null;
let jsQRReady=false;

function setStat(m,c){const e=document.getElementById('stat');e.textContent=m;e.className='stat'+(c?' '+c:'');}
function setScanStatus(m,c){const e=document.getElementById('scanStatus');e.textContent=m;e.className='scan-status'+(c?' '+c:'');}
function show(id){document.querySelectorAll('.screen').forEach(s=>s.classList.add('hidden'));document.getElementById(id).classList.remove('hidden');}

// ── Load jsQR with guaranteed onload callback ──────────────────────────
function loadJsQR(callback) {
  const cdns = [
    'https://cdnjs.cloudflare.com/ajax/libs/jsQR/1.4.0/jsQR.min.js',
    'https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js',
    'https://unpkg.com/jsqr@1.4.0/dist/jsQR.min.js',
  ];
  let idx = 0;
  function tryNext() {
    if (idx >= cdns.length) {
      setScanStatus('❌ Scanner konnte nicht geladen werden. Bitte Internetverbindung prüfen.', 'err');
      return;
    }
    const script = document.createElement('script');
    script.src = cdns[idx++];
    script.onload = () => {
      jsQRReady = true;
      setScanStatus('✅ Bereit – Karte fotografieren', 'ok');
      if (callback) callback();
    };
    script.onerror = () => { script.remove(); tryNext(); };
    document.head.appendChild(script);
  }
  tryNext();
}

// ── File input handler ────────────────────────────────────────────────
document.getElementById('qrInput').addEventListener('change', function(e) {
  const file = e.target.files[0];
  if (!file) return;
  if (!jsQRReady) { setScanStatus('⏳ Scanner lädt noch, bitte warten…', ''); return; }
  setScanStatus('🔍 Verarbeite Foto…', '');
  const reader = new FileReader();
  reader.onload = function(ev) {
    const img = new Image();
    img.onload = function() { scanImage(img); };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
});

function scanImage(img) {
  const canvas = document.getElementById('processCanvas');
  const ctx = canvas.getContext('2d', {willReadFrequently: true});
  const sizes = [1000, 600, 1600];
  for (const maxDim of sizes) {
    const scale = Math.min(1.0, maxDim / Math.max(img.width, img.height));
    canvas.width  = Math.round(img.width  * scale);
    canvas.height = Math.round(img.height * scale);
    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
    const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
    const code = jsQR(imageData.data, imageData.width, imageData.height, { inversionAttempts: 'attemptBoth' });
    if (code && code.data) { setScanStatus('✅ Erkannt!', 'ok'); handleQR(code.data); return; }
  }
  setScanStatus('❌ Nicht erkannt – QR-Code muss vollständig sichtbar sein', 'err');
}

function triggerScan() {
  if (!jsQRReady) { setScanStatus('⏳ Bitte warten – Scanner lädt…', ''); return; }
  document.getElementById('qrInput').value = '';
  document.getElementById('qrInput').click();
}

// ── QR Handler ────────────────────────────────────────────────────────
function handleQR(data) {
  let song = null;
  try {
    const url = new URL(data);
    const p = url.searchParams;
    if (p.get('y') && p.get('t') && p.get('a')) {
      song = { year:p.get('y'), title:p.get('t'), artist:p.get('a'), country:p.get('c')||'—', flag:p.get('f')||'🎵', place:p.get('p')||'—', sid:p.get('sid')||null, pr:p.get('pr')||null };
    }
  } catch(e) {}
  if (!song) { setScanStatus('❌ Kein ESC QR-Code', 'err'); return; }
  loadSong(song);
}

// ── Load Song ─────────────────────────────────────────────────────────
function loadSong(song) {
  aud.pause(); aud.src=''; clearInterval(pt);
  playing=false; revealed=false;
  document.getElementById('mystery').style.display='flex';
  document.getElementById('revcard').style.display='none';
  document.getElementById('rbtn').className='btn reveal';
  document.getElementById('rbtn').textContent='🔓 Auflösen';
  document.getElementById('pbtn').classList.remove('on');
  document.getElementById('pfill').style.width='0%';
  document.getElementById('tlbl').textContent='—';
  document.getElementById('rY').textContent=song.year;
  document.getElementById('rT').textContent=song.title;
  document.getElementById('rA').textContent=song.artist;
  document.getElementById('rC').innerHTML=song.flag+' '+song.country;
  document.getElementById('rP').textContent=song.place!=='—'?'Platz '+song.place:'ESC';
  show('playScreen');
  setStat('Suche Preview…','');
  fetchPreview(song);
}

// ── iTunes Preview ────────────────────────────────────────────────────
async function fetchPreview(song) {
  if (song.pr) { setAudio(song.pr); return; }
  if (song.sid) {
    try {
      const r=await fetch('https://itunes.apple.com/lookup?id='+song.sid);
      const d=await r.json();
      const hit=(d.results||[]).find(x=>x.previewUrl);
      if (hit) { setAudio(hit.previewUrl); return; }
    } catch(e) {}
  }
  try {
    const q=encodeURIComponent(song.artist+' '+song.title);
    const r=await fetch('https://itunes.apple.com/search?term='+q+'&media=music&entity=song&limit=10&country=de');
    const d=await r.json();
    const hit=(d.results||[]).find(x=>x.previewUrl);
    if (hit) { setAudio(hit.previewUrl); return; }
  } catch(e) {}
  try {
    const q=encodeURIComponent(song.artist+' '+song.title);
    const r=await fetch('https://itunes.apple.com/search?term='+q+'&media=music&entity=song&limit=10');
    const d=await r.json();
    const hit=(d.results||[]).find(x=>x.previewUrl);
    if (hit) { setAudio(hit.previewUrl); return; }
  } catch(e) {}
  try {
    const q=encodeURIComponent(song.title);
    const r=await fetch('https://itunes.apple.com/search?term='+q+'&media=music&entity=song&limit=10');
    const d=await r.json();
    const hit=(d.results||[]).find(x=>x.previewUrl);
    if (hit) { setAudio(hit.previewUrl); return; }
  } catch(e) {}
  setStat('Keine Vorschau gefunden','err');
}

function setAudio(url) {
  aud.src=url; aud.load();
  document.getElementById('tlbl').textContent='0:30';
  setStat('Bereit – tippe ▶','');
}

// ── Playback ──────────────────────────────────────────────────────────
function togglePlay() {
  if (!aud.src||aud.src===location.href) { setStat('Kein Song geladen','err'); return; }
  if (playing) {
    aud.pause(); playing=false;
    document.getElementById('pbtn').classList.remove('on');
    clearInterval(pt); setStat('Pausiert','');
  } else {
    aud.play().then(()=>{
      playing=true;
      document.getElementById('pbtn').classList.add('on');
      setStat('♫ Spielt…','ok');
      pt=setInterval(()=>{
        if (!aud.duration) return;
        document.getElementById('pfill').style.width=(aud.currentTime/aud.duration*100)+'%';
        const r=Math.max(0,Math.ceil(aud.duration-aud.currentTime));
        document.getElementById('tlbl').textContent=Math.floor(r/60)+':'+String(r%60).padStart(2,'0');
      },500);
    }).catch(e=>setStat('Fehler: '+e.message,'err'));
  }
}

aud.addEventListener('ended',()=>{
  playing=false;
  document.getElementById('pbtn').classList.remove('on');
  document.getElementById('pfill').style.width='100%';
  document.getElementById('tlbl').textContent='0:00';
  clearInterval(pt); setStat('Fertig – Auflösen?','');
});

// ── Reveal ────────────────────────────────────────────────────────────
function reveal() {
  if (revealed) return; revealed=true;
  document.getElementById('mystery').style.display='none';
  document.getElementById('revcard').style.display='flex';
  document.getElementById('rbtn').className='btn reveal done';
  document.getElementById('rbtn').textContent='✓ Aufgedeckt';
  const cols=['#6E63E8','#E84C9E','#B45CCB','#5566E6','#E87BAE'];
  const c=document.getElementById('cf');
  for(let i=0;i<36;i++){
    const el=document.createElement('div');
    const sz=5+Math.random()*9,tx=(Math.random()-.5)*300,ty=-(80+Math.random()*220),rot=Math.random()*720,dl=Math.random()*.3;
    el.style.cssText=`position:absolute;width:${sz}px;height:${sz}px;background:${cols[i%5]};border-radius:${Math.random()>.5?'50%':'2px'};left:${35+Math.random()*30}%;top:55%;animation:cf${i} ${.8+Math.random()*.4}s ${dl}s ease-out forwards`;
    const st=document.createElement('style');
    st.textContent=`@keyframes cf${i}{to{transform:translate(${tx}px,${ty}px) rotate(${rot}deg);opacity:0}}`;
    document.head.appendChild(st);c.appendChild(el);
    setTimeout(()=>{el.remove();st.remove();},1400);
  }
}

// ── Navigation ────────────────────────────────────────────────────────
function goScan() {
  aud.pause(); aud.src=''; playing=false; clearInterval(pt);
  setScanStatus(jsQRReady ? '✅ Bereit – Karte fotografieren' : 'Lädt…', jsQRReady ? 'ok' : '');
  show('scanScreen');
}

// Nächste Karte: Wiedergabe stoppen, auf den Scan-Screen wechseln (damit bei
// Fehlschlag/Abbruch der Hinweis + Wiederholen-Button erscheint, nicht der alte
// Song) und direkt die Kamera öffnen. Bei Erfolg geht es sofort zum neuen Song.
function nextCard() {
  goScan();                       // stoppt Audio, zeigt Scan-Screen mit Status
  if (jsQRReady) triggerScan();   // öffnet sofort die Kamera
}

// ── Init ──────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('scanBtn').addEventListener('click', triggerScan);
  document.getElementById('pbtn').addEventListener('click', togglePlay);
  document.getElementById('rbtn').addEventListener('click', reveal);
  document.getElementById('btnNext').addEventListener('click', nextCard);
  loadJsQR();
});

// Direct URL load (when QR code is scanned with native camera)
window.addEventListener('load', () => {
  const p=new URLSearchParams(location.search);
  if (p.get('y')&&p.get('t')&&p.get('a')) {
    handleQR(location.href);
    // Parameter aus der Adresse entfernen, damit ein automatischer Reload
    // (z. B. nach dem Öffnen der Kamera auf iOS) nicht erneut diesen Song lädt.
    try { history.replaceState(null, '', location.pathname); } catch(e) {}
  }
});
</script>
</body>
</html>
